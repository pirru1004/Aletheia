<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Aletheia</title>
<desc>The letter A as a prism. Three rays converge from the left; one truth beam emerges as the crossbar of the A and continues outward.</desc>

<style>
  line { stroke: #1A1A1A; stroke-width: 2; stroke-linecap: round; fill: none; }
  circle { fill: #1A1A1A; }
  text { fill: #1A1A1A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

  .r1 { stroke-dasharray: 220; stroke-dashoffset: 220; animation: d 1.0s ease-out 0.00s forwards; }
  .r2 { stroke-dasharray: 220; stroke-dashoffset: 220; animation: d 1.0s ease-out 0.12s forwards; }
  .r3 { stroke-dasharray: 220; stroke-dashoffset: 220; animation: d 1.0s ease-out 0.24s forwards; }
  .al { stroke-dasharray: 130; stroke-dashoffset: 130; animation: d 0.8s ease-out 0.45s forwards; }
  .ar { stroke-dasharray: 130; stroke-dashoffset: 130; animation: d 0.8s ease-out 0.55s forwards; }
  .dt { opacity: 0; animation: p 0.35s ease-out 1.15s forwards; }
  .tb { stroke-dasharray: 270; stroke-dashoffset: 270; animation: d 1.2s ease-out 1.35s forwards; }
  .wm { opacity: 0; animation: f 0.8s ease-out 2.10s forwards; }

  @keyframes d { to { stroke-dashoffset: 0; } }
  @keyframes p { from { opacity: 0; } to { opacity: 1; } }
  @keyframes f { to { opacity: 1; } }
</style>

<line class="r1" x1="110" y1="85"  x2="316" y2="110"/>
<line class="r2" x1="100" y1="110" x2="316" y2="110"/>
<line class="r3" x1="110" y1="135" x2="316" y2="110"/>

<line class="al" x1="296" y1="160" x2="340" y2="50"/>
<line class="ar" x1="340" y1="50"  x2="384" y2="160"/>

<line class="tb" x1="316" y1="110" x2="580" y2="110"/>

<circle class="dt" cx="316" cy="110" r="5"/>

<text class="wm" x="340" y="232" text-anchor="middle" font-size="28" font-weight="500" letter-spacing="7">ALETHEIA</text>
</svg>
